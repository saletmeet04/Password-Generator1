<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#1e293b;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#fff;
    padding:30px;
    width:380px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.output{
    display:flex;
    margin-bottom:20px;
}

.output input{
    flex:1;
    padding:10px;
    font-size:18px;
}

.output button{
    padding:10px 15px;
    border:none;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

.options{
    margin:15px 0;
}

.options label{
    display:block;
    margin:10px 0;
}

input[type=range]{
    width:100%;
}

.generate{
    width:100%;
    padding:12px;
    background:#16a34a;
    color:white;
    border:none;
    font-size:18px;
    cursor:pointer;
    border-radius:6px;
}

.generate:hover{
    background:#15803d;
}
</style>

</head>
<body>

<div class="container">

<h2>🔐 Password Generator</h2>

<div class="output">
<input type="text" id="password" readonly>
<button onclick="copyPassword()">Copy</button>
</div>

<label>Password Length: <span id="lengthValue">12</span></label>
<input type="range" min="6" max="30" value="12" id="length">

<div class="options">
<label><input type="checkbox" id="uppercase" checked> Uppercase</label>
<label><input type="checkbox" id="lowercase" checked> Lowercase</label>
<label><input type="checkbox" id="numbers" checked> Numbers</label>
<label><input type="checkbox" id="symbols" checked> Symbols</label>
</div>

<button class="generate" onclick="generatePassword()">Generate Password</button>

</div>

<script>

const length=document.getElementById("length");
const lengthValue=document.getElementById("lengthValue");

length.oninput=()=>{
lengthValue.innerText=length.value;
}

function generatePassword(){

let chars="";

if(document.getElementById("uppercase").checked)
chars+="ABCDEFGHIJKLMNOPQRSTUVWXYZ";

if(document.getElementById("lowercase").checked)
chars+="abcdefghijklmnopqrstuvwxyz";

if(document.getElementById("numbers").checked)
chars+="0123456789";

if(document.getElementById("symbols").checked)
chars+="!@#$%^&*()_+?><:{}[]";

if(chars===""){
alert("Select at least one option");
return;
}

let password="";

for(let i=0;i<length.value;i++){
password+=chars.charAt(Math.floor(Math.random()*chars.length));
}

document.getElementById("password").value=password;

}

function copyPassword(){

let pass=document.getElementById("password");

if(pass.value===""){
alert("Generate password first");
return;
}

navigator.clipboard.writeText(pass.value);

alert("Password Copied!");

}

generatePassword();

</script>

</body>
</html>
